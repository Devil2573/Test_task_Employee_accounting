<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет сотрудников</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Управление сотрудниками</h1>

    <div class="form">
        <h2 id="form-title">Добавить сотрудника</h2>
        <form id="employee-form">

            <label>ФИО:</label>
            <input type="text" id="full-name" required>
        
            <label>Дата рождения:</label>
            <input type="date" id="birth-date" required>

            <label>Паспорт (серия номер):</label>
            <input type="text" id="passport" placeholder="1234 567890" required >

            <label>Контактная информация (телефон):</label>
            <input type="text" id="contact-info" placeholder="+71234567890" required>
        
            <label>Адрес проживания:</label>
            <input type="text" id="address" required>
    
            <label>Отдел:</label>
            <input type="text" id="department" required>

            <label>Должность:</label>
            <input type="text" id="position" required>
        
            <label>Размер зарплаты:</label>
            <input type="number" id="salary" required>
        
            <label>Дата принятия на работу:</label>
            <input type="date" id="hire-date" required>
            
            <button type="submit" id="submit-btn">Сохранить</button>
            <button type="button" id="cancel-edit" style="display:none;">Отмена</button>
        </form>
    </div>

    <div class="filters">
            <label>Фильтр по отделу:</label>
            <input type="text" id="filter-department" placeholder="Отдел">

            <label>Фильтр по должности:</label>
            <input type="text" id="filter-position" placeholder="Должность">

        <button id="apply-filters">Применить фильтры</button>
        <button id="clear-filters">Сбросить</button>
    </div>

    <div class="search">
        <input type="text" id="search-input" placeholder="Поиск по ФИО">
        <button id="search-btn">Найти</button>
        <button id="clear-search">Сбросить поиск</button>
    </div>

    <table id="employees-table">
        <thead>
            <tr>
                <th>ФИО</th>
                <th>Дата рождения</th>
                <th>Паспорт</th>
                <th>Контакты</th>
                <th>Адрес</th>
                <th>Отдел</th>
                <th>Должность</th>
                <th>Зарплата</th>
                <th>Дата приёма</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="table-body">

        </tbody>
    </table>

    <script src="script.js"></script>

</body>
</html>
